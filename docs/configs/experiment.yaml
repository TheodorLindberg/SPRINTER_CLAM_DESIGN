# Experiment config — DRAFT. One file per experiment: shared defaults + explicit runs (each seed-sweeps).
# Real experiments live under config/experiments/<name>.yaml. An optional `hpo` block adds a separate search.

experiment: ki67_stain_comparison

defaults:                         # inherited by every run unless overridden
  subset: development             # development (CV) | holdout | all
  target: ki67_avg
  seed_set: prostate_main
  architecture:
    family: clam                  # regression | clam | non_clam
    type: attention_mil
    params: { hidden_dims: [512, 256], n_layers: 2, dropout: 0.25 }
  hyperparameters:
    learning_rate: 1.0e-4
    weight_decay: 1.0e-5
    dropout: 0.25
    epochs: 100
  label_balancing: { enabled: true, strategy: bins, n_bins: 4 }
  target_normalization: true        # false → train & predict in raw label units (for comparison)

runs:                             # each: a run_id + the keys it overrides; bundle referenced by components
  - { run_id: he_conch,   bundle: { cohort: prostate_combined_v1, stain: HE,   variant: raw, embedding: conch } }
  - { run_id: he_lr1e3,   bundle: { cohort: prostate_combined_v1, stain: HE,   variant: raw, embedding: conch }, hyperparameters: { learning_rate: 1.0e-3 } }
  - { run_id: ki67_conch, bundle: { cohort: prostate_combined_v1, stain: Ki67, variant: raw, embedding: conch } }

hpo:                              # optional · a separate search; promote best N → seed sweep
  enabled: false
  method: bayesian                # grid | bayesian (Optuna / TPE)
  n_trials: 200
  space:
    learning_rate: { low: 1.0e-5, high: 1.0e-3, log: true }
    dropout:       { low: 0.1, high: 0.5 }
  promote_top_n: 3
