# Stage 3 · Dataset Preprocessing — DRAFT. (1) cached per-scan work, (2) bundle assembly.

labels:
  sources:                        # one or more raw tables, merged on (patient, biopsy)
    - { file: labels/ki67.csv,    columns: { ki67_quartiles: [q1, q2, q3, q4] } }
    - { file: labels/gleason.csv, columns: { gleason: gleason_grade } }
    - { file: labels/lengths.csv, columns: { biopsy_len: biopsy_length_mm, tumor_len: tumor_length_mm } }
  derived:                        # normalized targets computed from the merged sources
    - { name: ki67_avg,  type: continuous, from: ki67_quartiles, op: mean }
    - { name: ki67_high, type: binary,     from: ki67_avg,       threshold: 20 }
    - { name: gleason,   type: ordinal,    from: gleason }

patching:
  patch_size: 256
  resolution_mpp: 0.5
  overlap: 0.0                    # stride derived from this

embedding:
  model: conch                    # embedding model id (see impl registry of supported models)
  cache: content_addressed        # key: coords + size + resolution + model + variant + aug
  augmentation:                   # image-space; runs the foundation model, cached separately
    enabled: true
    transforms:
      horizontal_flip: true
      vertical_flip: true
      rotation90: true            # 0 / 90 / 180 / 270
      stain_jitter: 0.1           # HED color jitter
    n_variants: 2                 # augmented embedded copies per patch

bundle:                           # a bundle is a PREPARED COHORT (one per stain/embedding/variant)
  cohort: prostate_combined_v1
  stains: [HE]                        # one stain per bundle for now (multi-stain = future)
  embedding_model: conch          # must match embedding.model above; appears in bundle_id
  source_variant: raw             # raw for training/metrics
  include_labels: true            # false for label-free evaluation bundles
  embeddings: symlink             # symlink | copy
