# Stage 4 · Model experiment — DRAFT. Shared defaults + explicit runs; each run seed-sweeps.

model_experiment: ki67_stain_comparison

defaults:                         # inherited by every run unless overridden
  subset: development             # development (CV) | holdout | all
  target: ki67_avg
  seed_set: prostate_main
  architecture:
    family: clam                  # regression | clam | non_clam
    type: attention_mil
    params: { hidden_dims: [512, 256], n_layers: 2, dropout: 0.25 }
  hyperparameters:
    learning_rate: 1.0e-4
    weight_decay: 1.0e-5
    dropout: 0.25
    epochs: 100
  label_balancing: { enabled: true, strategy: bins, n_bins: 4 }
  use_augmented_embeddings: true

runs:                             # each: a run_id + only the keys it overrides
  - { run_id: he_lr1e4,   bundle: prostate_combined_v1__sHE__raw__conch }
  - { run_id: he_lr1e3,   bundle: prostate_combined_v1__sHE__raw__conch, hyperparameters: { learning_rate: 1.0e-3 } }
  - { run_id: ki67_lr1e4, bundle: prostate_combined_v1__sKi67__raw__conch }
