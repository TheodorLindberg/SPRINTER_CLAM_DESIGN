# Stage 4 · Model experiment — DRAFT
# A model experiment shares config across many runs and fans each run out over the
# seed sweep. Runs are explicit, named variations (a different bundle, or different
# hyperparameters) — not auto-generated. HPO is a SEPARATE config (hpo.yaml).
# Inherits roots from base.yaml. See design/06-model-training.md and design/11-reports.md.

model_experiment: ki67_stain_comparison   # umbrella name; groups every run below

defaults:                            # shared by every run unless the run overrides it
  subset: development                # development (CV) | holdout | all (final retrain)
  target: ki67_avg
  seed_set: prostate_main            # fold × model seed sweep (from seeds.yaml)
  architecture:
    family: clam                     # regression | clam | non_clam
    type: attention_mil
    params: { hidden_dims: [512, 256], n_layers: 2, dropout: 0.25 }
  hyperparameters:
    learning_rate: 1.0e-4
    weight_decay: 1.0e-5
    dropout: 0.25
    epochs: 100
  label_balancing: { enabled: true, strategy: bins, n_bins: 4 }
  use_augmented_embeddings: true     # sample augmented sets produced in preprocessing

runs:                                # each inherits defaults + a run_id; overrides a few keys
  - { run_id: he_lr1e4,   bundle: prostate_combined_v1__sHE__raw__conch }
  - { run_id: he_lr1e3,   bundle: prostate_combined_v1__sHE__raw__conch, hyperparameters: { learning_rate: 1.0e-3 } }
  - { run_id: ki67_lr1e4, bundle: prostate_combined_v1__sKi67__raw__conch }

# The bundle implies the cohort; seed_set must reference the same cohort (validated).
