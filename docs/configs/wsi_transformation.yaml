# Stage 2 · WSI Transformation — DRAFT. Registration + tissue outline detection.

dataset_id: sahlgrenska_2018
input_manifest: data/normalized/sahlgrenska_2018/manifest.yaml   # input scan manifest (YAML/JSON)

variants: [raw, rigid, elastic]   # source variants to produce

registration:
  method: valis                   # registration backend
  # reference_stain comes from base.yaml (default HE); override here only if needed

outlines:
  tissue_method: valis            # valis | hsv_otsu — the single outline the pipeline produces & uses
  debug_compare_methods: false    # DEBUG ONLY: also run the other method, write it + a comparison
                                  # overlay to roots.debug; never read downstream
  per_stain: true
  cross_stain_intersection: true  # from the elastic overlap; saved per scan
  quartile_subdivision: true      # geometric split along the biopsy long axis
  geojson_export: true            # export for TissUUmaps viewing
