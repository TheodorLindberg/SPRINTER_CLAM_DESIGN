# Stage 4 · Model Training — DRAFT
# See design/06-model-training.md.

bundle: data/bundles/example_dataset_v1__train
seeds: configs/seeds.yaml         # split registry

target: ki67_avg                  # label name to train on

architecture:
  family: clam                    # regression | clam | non_clam
  type: attention_mil
  params:
    hidden_dims: [512, 256]
    n_layers: 2
    dropout: 0.25

hyperparameters:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  dropout: 0.25
  epochs: 100

label_balancing:
  enabled: true
  # classification: class_weights | oversample | undersample
  # regression: bin the target and balance across bins
  strategy: bins
  n_bins: 4

augmentation:
  enabled: true
  level: bag                      # bag | embedding  (image-space needs re-embedding)
  instance_dropout: 0.1
  bag_subsample: 0.8
  feature_noise: 0.0

sweep:
  enabled: true                   # runs all fold_seed × model_seed combinations

hpo:
  enabled: false
  method: bayesian                # grid | bayesian (e.g. Optuna/TPE)
