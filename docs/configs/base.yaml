# Base config — DRAFT. Shared roots + rarely-edited settings.

roots:
  raw:        data/raw          # raw datasets (read-only)
  normalized: data/normalized   # ingested, standardized
  processed:  data/processed    # cached embeddings, outlines, patches
  bundles:    data/bundles      # prepared cohorts (bundles)
  results:    results           # runs + reports
  debug:      results/debug     # QC / method-comparison outputs; never read downstream

registries:
  cohorts: configs/cohorts.yaml
  seeds:   configs/seeds.yaml

defaults:
  source_variant: raw           # training/metrics default
  reference_stain: HE           # registration reference frame; all stains register to it

