# HPO — DRAFT. Hyperparameter search over one bundle; outputs segregated, top-N kept.

hpo: ki67_he_search
bundle: prostate_combined_v1__sHE__raw__conch
subset: development               # development | holdout | all
target: ki67_avg
seed_set: prostate_main

architecture:
  family: clam
  type: attention_mil

method: bayesian                  # grid | bayesian (Optuna / TPE)
n_trials: 200
space:
  learning_rate: { low: 1.0e-5, high: 1.0e-3, log: true }
  dropout:       { low: 0.1, high: 0.5 }

promote_top_n: 3                  # promote the best N trials → seed-sweep them in a model experiment
                                  # (checkpoint retention is set in reports.yaml → hpo.keep_checkpoints)
