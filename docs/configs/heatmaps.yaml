# Stage 6 · Heatmap Generation — DRAFT
# See design/08-heatmaps.md.

beam_dir: runs/evaluation/ki67_avg_clam__heldout_v1
source_variant: elastic           # raw | rigid | elastic (underlay alignment)
# Attention is in the RAW frame — coords are pushed through this variant's
# transformation matrix before overlay.

attention_type: rank              # rank | sigmoid | raw  (rank = robust default)
colormap: viridis                 # perceptually uniform

render:
  mask_non_tissue: true
  draw_outline: true
  scale_bar: true                 # uses patch resolution / mpp
  caption: true                   # biopsy_id, pred vs label, model, stain, variant

outputs:
  png: true
  tissuumaps_geojson: true        # patch polygons carrying attention as properties
