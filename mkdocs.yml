site_name: Histology MIL Pipeline

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["docs/configs"]
      check_paths: true
  - tables
  - attr_list
  - admonition
  - pymdownx.details

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Design:
      - Overview: design/01-overview.md
      - Data Model: design/02-data-model.md
      - 1 · Data Ingestion: design/03-data-ingestion.md
      - 2 · WSI Transformation: design/04-wsi-transformation.md
      - 3 · Dataset Preprocessing: design/05-dataset-preprocessing.md
      - 4 · Model Training: design/06-model-training.md
      - 5 · Evaluation: design/07-evaluation.md
      - 6 · Heatmap Generation: design/08-heatmaps.md
      - Reports: design/11-reports.md
      - Open Questions: design/09-open-questions.md
      - Appendix · Decisions: design/12-appendix.md
      - Configuration:
          - Overview: design/10-configuration.md
          - Base: configs/base.md
          - Cohorts: configs/cohorts.md
          - Split registry (seeds): configs/seeds.md
          - 2 · WSI Transformation: configs/wsi_transformation.md
          - 3 · Dataset Preprocessing: configs/preprocessing.md
          - 4 · Model Experiment: configs/model_experiment.md
          - 4 · HPO: configs/hpo.md
          - 5 · Evaluation: configs/evaluation.md
          - 6 · Heatmap Generation: configs/heatmaps.md
          - Reports: configs/reports.md
  - Formats:
      - BEAM: formats/beam.md
      - Embeddings & Patches: formats/embeddings-and-patches.md
      - Outlines: formats/outlines.md
